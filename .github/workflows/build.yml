name: Build packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64-pyside2
            os: windows-latest
            qt_api: pyside2
            package_name: QQListener-windows-x64-pyside2.exe
          - name: macos-intel-pyside2
            os: macos-15-intel
            qt_api: pyside2
            package_name: QQListener-macos-intel-pyside2.app.zip
          - name: windows-x64-pyside6
            os: windows-latest
            qt_api: pyside6
            package_name: QQListener-windows-x64-pyside6.exe
          - name: macos-arm64-pyside6
            os: macos-26
            qt_api: pyside6
            package_name: QQListener-macos-arm64-pyside6.app.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install PySide6 dependencies
        if: matrix.qt_api == 'pyside6'
        run: |
          python -m pip install --upgrade pip uv
          uv sync --frozen
          uv pip install "pyinstaller>=6.10,<7"

      - name: Install PySide2 dependencies
        if: matrix.qt_api == 'pyside2'
        shell: bash
        run: |
          python -m pip install --upgrade pip uv
          uv venv --python 3.10
          uv pip install \
            "aiohttp>=3.13.3" \
            "edge-tts>=7.2.7" \
            "loguru>=0.7.2" \
            "psutil>=7.2.2" \
            "pygame>=2.6.1" \
            "PySide2>=5.15.2.1,<5.16" \
            "PySide2-Fluent-Widgets>=1.8.7" \
            "pycaw>=20240210; sys_platform == 'win32'" \
            "uiautomation>=2.0.29; sys_platform == 'win32'" \
            "winsdk>=1.0.0b10; sys_platform == 'win32'" \
            "pyinstaller>=6.10,<7"
          uv pip uninstall -y \
            PySide6 \
            PySide6-Addons \
            PySide6-Essentials \
            PySide6-Fluent-Widgets \
            shiboken6 \
            PySideSix-Frameless-Window || true
          uv pip list | grep -Ei "pyside|fluent|frameless" || true

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: uv pip install "pyobjc-framework-Cocoa>=10"

      - name: Clean PySide2 Qt environment
        if: matrix.qt_api == 'pyside2'
        shell: bash
        run: |
          uv pip uninstall -y \
            PySide6 \
            PySide6-Addons \
            PySide6-Essentials \
            PySide6-Fluent-Widgets \
            shiboken6 \
            PySideSix-Frameless-Window || true
          uv pip install --reinstall --no-deps "PySide2-Fluent-Widgets>=1.8.7"
          uv pip list | grep -Ei "pyside|fluent|frameless" || true

      - name: Compile check
        run: uv run python -m compileall -q src main.py scripts

      - name: Qt import check
        shell: bash
        env:
          QQLISTENER_QT_API: ${{ matrix.qt_api }}
        run: |
          uv run python - <<'PY'
          import importlib.util
          import os

          expected = os.environ["QQLISTENER_QT_API"]
          forbidden = "PySide6" if expected == "pyside2" else "PySide2"
          if importlib.util.find_spec(forbidden):
              raise SystemExit(f"{forbidden} must not be installed in {expected} job")

          from src.ui.qt_compat import QT_API
          import src.ui.fluent_compat

          assert QT_API == expected, (QT_API, expected)
          print(QT_API)
          PY

      - name: Build app
        env:
          QQLISTENER_QT_API: ${{ matrix.qt_api }}
        run: uv run python scripts/build_app.py --qt-api ${{ matrix.qt_api }}

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Copy-Item "dist/QQListener.exe" "${{ matrix.package_name }}" -Force

      - name: Package macOS artifact
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          if [ -d "dist/QQListener.app" ]; then
            ditto -c -k --sequesterRsrc --keepParent "dist/QQListener.app" "${{ matrix.package_name }}"
          else
            cp "dist/QQListener" "QQListener-macos"
            chmod +x "QQListener-macos"
            ditto -c -k --sequesterRsrc "QQListener-macos" "${{ matrix.package_name }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.package_name }}
          if-no-files-found: error
